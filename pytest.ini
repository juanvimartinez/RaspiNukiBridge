[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts =
    --verbose
    --cov=.
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=60
    --cov-config=.coveragerc

markers =
    integration: Integration tests that test multiple components together
    slow: Slow running tests
